info:
    title: Qubic Query API
    description: API for querying historical Qubic ledger data.
    version: 1.0.0
servers:
    - url: https://rpc.qubic.org/query/v1
paths:
    /getComputorListsForEpoch:
        post:
            tags:
                - Network
            summary: Get Epoch Computors
            description: |-
                Get the list(s) of computors for one epoch. These are the computors (IDs signed by the arbitrator) that
                 are allowed to make quorum decisions. It is possible that this list changes within the epoch in case of
                 arbitrator intervention.
            operationId: ArchiveQueryService_GetComputorsListsForEpoch
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GetComputorListsForEpochRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetComputorListsForEpochResponse'
    /getEventLogs:
        post:
            tags:
                - Events (Beta)
            summary: Get Event Logs
            description: |-
                Query event logs with optional filters.

                 Please note: beta version – may be subject to incompatible changes.

                 ###  Request structure

                 | Name       | Type               | Necessity | Description                                                    |
                 |------------|--------------------|-----------|----------------------------------------------------------------|
                 | filters    | map<string,string> | optional  | The filter value must appear in the matching documents.        |
                 | exclude    | map<string,string> | optional  | The filter value must not appear in the matching documents.    |
                 | should     | repeated ShouldFilter | optional  | At least one of the filter values must match. Needs multiple terms/ranges. |
                 | ranges     | map<string,Range>  | optional  | Filters that restrict results to a value range.                |
                 | pagination | Pagination         | optional  | Allows to specify the first record and number of records.      |

                 ### Filters

                 A filter property must only be used in one filter, if not explicitly stated otherwise.
                 If multiple values are used they need to be comma separated. See below for allowed properties.
                 Many fields are conditional per log type. Some fields are universal and present for all logs.

                 #### Include filter properties

                 | Name                  |  Type  |  Format                        | Description                                                               |
                 |-----------------------|--------|--------------------------------|---------------------------------------------------------------------------|
                 | source                | string | 60 character identity, up to 5 | The source identity. (conditional)                                        |
                 | destination           | string | 60 character identity, up to 5 | The destination identity. (conditional)                                   |
                 | transactionHash       | string | Hash                           | Hash of the related transaction. (conditional)                            |
                 | tickNumber            | string | Numeric                        | The tick the log belongs to. (universal)                                  |
                 | logId                 | string | Numeric                        | Index of the log within the tick. Should be unique per epoch. (universal) |
                 | logType               | string | Numeric, up to 5               | The type of the log. (universal)                                          |
                 | categories            | string | Numeric, up to 5               | Log category. (conditional)                                               |
                 | epoch                 | string | Numeric (uint32)               | The epoch. (universal)                                                    |
                 | assetName             | string | String, max 7 chars            | Name of the asset. (conditional)                                          |
                 | assetIssuer           | string | 60 character identity          | Issuer of the asset. (conditional)                                        |
                 | managingContractIndex | string | Numeric (uint64)               | Managing contract index. (conditional)                                    |
                 | contractIndex         | string | Numeric (uint64)               | Contract index. (conditional)                                             |
                 | contractMessageType   | string | Numeric (uint64)               | Contract message type. (conditional)                                      |
                 | deductedAmount        | string | Numeric (uint64)               | Deducted amount. (conditional)                                            |
                 | remainingAmount       | string | Numeric (int64)                | Remaining amount. (conditional)                                           |
                 | customMessage         | string | Numeric (uint64)               | Custom message. (conditional)                                             |

                 The following categories are theoretically supported at the moment. Not all are available in the archive.
                 See log data consumer code for more details:

                 | Name          | Category |
                 |---------------|----------|
                 | "SC_INITIALIZE_TX"   | 1 |
                 | "SC_BEGIN_EPOCH_TX"  | 2 |
                 | "SC_BEGIN_TICK_TX"   | 3 |
                 | "SC_END_TICK_TX"     | 4 |
                 | "SC_END_EPOCH_TX"    | 5 |
                 | "SC_NOTIFICATION_TX" | 6 |

                 #### Exclude filter properties

                 It is allowed to use exclude filters together with should filters.

                 | Name            |  Type   | Format   | Description                                             |
                 |-----------------|---------|----------|---------------------------------------------------------|
                 | source      | string | 60 character identity, up to 5, comma separated. | Only find logs with another source. |
                 | destination | string | 60 character identity, up to 5, comma separated.  | Only find logs with another destination.   |

                 #### Should filter term properties

                 | Name            |  Type   | Format   | Description                                             |
                 |-----------------|---------|----------|---------------------------------------------------------|
                 | source      | string | 60 character identity, up to 5, comma separated. | Find logs with this source. |
                 | destination | string | 60 character identity, up to 5, comma separated.  | Find logs with this source.  |
                 | amount      | string | Numeric | Find logs with this amount. |
                 | numberOfShares | string | Numeric  | Find logs with these number of shares.  |

                 #### Should filter range properties

                 | Name            |  Type   | Format   | Description                                             |
                 |-----------------|---------|----------|---------------------------------------------------------|
                 | amount      | string | Numeric | Find logs in the amount range. |
                 | numberOfShares | string | Numeric  | Find logs in the number of shares range.  |

                 #### Range filter properties

                 Ranges restrict the results to a range of values by defining a maximum and/or minimum value.

                 | Name            | Type   | Format                                   | Description                                        |
                 |-----------------|--------|------------------------------------------|----------------------------------------------------|
                 | amount          | string | Numeric                                  | Only find logs in the amount range.                |
                 | numberOfShares  | string | Numeric                                  | Only find logs withing the number of shares range. |
                 | tickNumber      | string | Numeric                                  | Only find logs in the tick range.                  |
                 | timestamp       | string | Numeric (Unix Timestamp in milliseconds) | Only find logs in the time range.                  |
                 | epoch           | string | Numeric (uint32)                         | Only find logs in the epoch range.                 |
                 | deductedAmount  | string | Numeric (uint64)                         | Only find logs in the deducted amount range.       |
                 | remainingAmount | string | Numeric (int64)                          | Only find logs in the remaining amount range.      |

                 ### Pagination

                 | Name   | Type   | Necessity | Description                                                                                         |
                 |--------|--------|-----------|-----------------------------------------------------------------------------------------------------|
                 | offset | uint32 | optional  | The offset of the first record to return. Defaults to zero (first record). Maximum offset is 10000. |
                 | size   | uint32 | optional  | Defaults to 10. Maximum size is 1000. Zero value is ignored (uses default). |
            operationId: ArchiveQueryService_GetEventLogs
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GetEventLogsRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetEventLogsResponse'
    /getLastProcessedTick:
        get:
            tags:
                - Archive
            summary: Get Last Processed Tick
            description: |-
                Get the last processed tick and other processing information from the archive.
                 All data queried from the archive is only fully processed up to this tick.
                 Before calling the service you should check the last processed tick to be sure to get
                 valid data and do not request data for future ticks that are not processed yet. You can use
                 the epoch and initial tick information in the response to switch to a new interval.
            operationId: ArchiveQueryService_GetLastProcessedTick
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetLastProcessedTickResponse'
    /getProcessedTickIntervals:
        get:
            tags:
                - Archive
            summary: Get Processed Tick Intervals
            description: |-
                Get the tick intervals that are available in the archive. A new tick interval is typically
                 created on epoch change or network restart within the epoch. Use this endpoint to skip the
                 tick numbers that are not part of the intervals. This endpoint is only necessary for users
                 that need to process all available ticks. For most users it is enough to switch to a new
                 interval by using the `get last processed tick` endpoint.
            operationId: ArchiveQueryService_GetProcessedTickIntervals
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetProcessedTickIntervalsResponse'
