                    description: The last processed tick of the interval.
                    format: uint32
            description: ProcessedTickInterval
        QuTransferData:
            type: object
            properties:
                source:
                    type: string
                destination:
                    type: string
                amount:
                    type: string
            description: QuTransferData contains fields specific to QU transfer events (type 0).
        Range:
            type: object
            properties:
                gt:
                    type: string
                    description: Greater than.
                gte:
                    type: string
                    description: Greater than or equal.
                lt:
                    type: string
                    description: Less than.
                lte:
                    type: string
                    description: Less than or equal.
            description: |-
                Range filter

                 | Name      | Type   | Necessity | Description                               |
                 |-----------|--------|-----------|-------------------------------------------|
                 | gt        | string | optional  | Greater than.                             |
                 | gte       | string | optional  | Greater than or equal to.                 |
                 | lt        | string | optional  | Less than.                                |
                 | lte       | string | optional  | Less than or equal to.                    |

                 One lower bound and one upper bound can be specified. One bound is needed. A range with size of 0 or 1 is not allowed.

                 Examples

                 ```
                 "amount": { "gt": "1000000" }
                 "tickNumber": { "gte": "25563000", "lte": "28300000" }
                 ```
        ShouldFilter:
            type: object
            properties:
                terms:
                    type: object
                    additionalProperties:
                        type: string
                    description: 'Or filters: One or more of the values must match.'
                ranges:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/Range'
                    description: Ranges restrict the results by a maximum and/or minimum value.
            description: |-
                Should Filters

                 One should filter can contain multiple terms and ranges. It needs at least two query clauses.
                 At least one of them has to match by default. See term and range filter documentation for examples.

                 Example

                 ```
                 "should": [
                   {
                     "terms": {
                       "source": "BAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAARMID",
                       "destination": "BAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAARMID"
                     }
                   }
                 ]
                 ```
        SmartContractMessageData:
            type: object
            properties:
                contractIndex:
                    type: string
                contractMessageType:
                    type: string
        TickData:
            type: object
            properties:
                tickNumber:
                    type: integer
                    format: uint32
                epoch:
                    type: integer
                    format: uint32
                computorIndex:
                    type: integer
                    format: uint32
                timestamp:
                    type: string
                varStruct:
                    type: string
                timeLock:
                    type: string
                transactionHashes:
                    type: array
                    items:
                        type: string
                contractFees:
                    type: array
                    items:
                        type: string
                signature:
                    type: string
            description: TickData
        Transaction:
            type: object
            properties:
                hash:
                    type: string
                amount:
                    type: string
                source:
                    type: string
                destination:
                    type: string
                tickNumber:
                    type: integer
                    format: uint32
                timestamp:
                    type: string
                inputType:
                    type: integer
                    description: Smart contract procedure index. (The smart contract procedure this transaction is supposed to trigger)
                    format: uint32
                inputSize:
                    type: integer
                    description: Size of input_data byte array.
                    format: uint32
                inputData:
                    type: string
                    description: Base64 encoded byte array containing a smart contract payload.
                signature:
                    type: string
                    description: Base64 encoded byte array representing the transactions's signature.
                moneyFlew:
                    type: boolean
                    description: Money flew is an additional information provided by some nodes with the tx status addon patch.
            description: Transaction
